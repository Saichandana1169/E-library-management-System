<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* Navbar */

        .navbar{
            background:#1e293b;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .nav-links{
            display:flex;
            gap:20px;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            font-size:16px;
        }

        .nav-links a:hover{
            color:#38bdf8;
        }

        /* Form Card */

        .container{
            width:500px;
            margin:60px auto;
        }

        .card{
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 2px 15px rgba(0,0,0,0.1);
        }

        .card h2{
            text-align:center;
            color:#1e293b;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#444;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .info-box{
            margin-top:20px;
            background:#e0f2fe;
            padding:15px;
            border-radius:8px;
            color:#0c4a6e;
        }

    </style>

</head>
<body>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="logo">
        E-Library Admin
    </div>

    <div class="nav-links">

        <a th:href="@{/admin/home}">
            Home
        </a>

        <a th:href="@{/admin/explore}">
            Explore Books
        </a>

        <a th:href="@{/admin/register}">
            Register Student
        </a>

        <a th:href="@{/admin/add-book}">
            Add Book
        </a>

        <a th:href="@{/logout}"
           th:if="${session.admin != null}">
            Logout
        </a>

    </div>

</nav>

<!-- ADD BOOK FORM -->

<div class="container">

    <div class="card">

        <h2>Add New Book</h2>

        <form th:action="@{/admin/add-book}"
              method="post">

            <div class="form-group">

                <label>
                    Book Name
                </label>

                <input type="text"
                       name="bookName"
                       placeholder="Enter Book Name"
                       required>

            </div>

            <div class="form-group">

                <label>
                    Book Stock
                </label>

                <input type="number"
                       name="stock"
                       placeholder="Enter Available Stock"
                       min="1"
                       required>

            </div>

            <button type="submit"
                    class="btn">
                Add Book
            </button>

        </form>

        <div class="info-box">

            <strong>Note:</strong>

            Each time a book is issued,
            stock decreases by 1.

            <br><br>

            When a book is returned,
            stock increases by 1 automatically.

        </div>

    </div>

</div>

</body>
</html>
