<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f7fa;
        }

        .container{
            width:400px;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 0 20px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            margin-top:15px;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Library Login</h2>

    <form th:action="@{/login}" method="post">

        <input type="text"
               name="id"
               placeholder="Enter ID"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
